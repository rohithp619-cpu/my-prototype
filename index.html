<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HELLO WORLD 🚀</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #111; cursor: crosshair;
    }
    #stage { position: relative; text-align: center; user-select: none; z-index: 2; }
    h1 {
      font-size: clamp(3rem, 14vw, 11rem);
      font-weight: 900; letter-spacing: -0.03em;
      background: linear-gradient(90deg,#ff004d,#ffa800,#00e756,#29adff,#ff77a8,#ff004d);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: hue 4s linear infinite, float 3s ease-in-out infinite;
      cursor: grab;
    }
    @keyframes hue { to { background-position: 300% 0; } }
    @keyframes float { 50% { transform: translateY(-20px) rotate(2deg); } }
    h1.shake { animation: hue 4s linear infinite, quake 0.25s linear infinite; }
    @keyframes quake {
      0%,100% { transform: translate(0,0) rotate(0); }
      25% { transform: translate(-12px,8px) rotate(-3deg) scale(1.05); }
      75% { transform: translate(12px,-8px) rotate(3deg) scale(1.05); }
    }
    .btns { margin-top: 2.5rem; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 0.9rem 1.8rem; font-size: 1rem; font-weight: 700;
      border: 2px solid #fff; border-radius: 999px;
      background: transparent; color: #fff; cursor: pointer;
      transition: transform 0.15s, background 0.2s, color 0.2s;
    }
    button:hover { background: #fff; color: #111; transform: translateY(-4px) scale(1.08); }
    button:active { transform: scale(0.9); }
    canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>
  <div id="stage">
    <h1 id="title">HELLO WORLD</h1>
    <div class="btns">
      <button onclick="boom()">💥 EXPLODE</button>
      <button onclick="rain()">🎉 CONFETTI</button>
      <button onclick="chaos()">🌀 CHAOS</button>
    </div>
  </div>
  <script>
    const cv = document.getElementById("fx"), ctx = cv.getContext("2d");
    const title = document.getElementById("title");
    let W, H, parts = [];
    const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
    addEventListener("resize", resize); resize();

    const COLORS = ["#ff004d","#ffa800","#00e756","#29adff","#ff77a8","#fff1e8"];
    const rnd = (a, b) => a + Math.random() * (b - a);

    function spawn(x, y, n, speed) {
      for (let i = 0; i < n; i++) {
        const a = rnd(0, Math.PI * 2), s = rnd(2, speed);
        parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
          r: rnd(3, 9), c: COLORS[i % COLORS.length], life: 1,
          rot: rnd(0, 6), vr: rnd(-0.3, 0.3) });
      }
    }
    const center = () => [W / 2, H / 2.4];
    function boom() { const [x, y] = center(); spawn(x, y, 120, 14); jolt(); }
    function rain() { for (let i = 0; i < 150; i++) parts.push({ x: rnd(0, W), y: rnd(-H, 0),
      vx: rnd(-1, 1), vy: rnd(3, 8), r: rnd(4, 10), c: COLORS[i % COLORS.length],
      life: 1, rot: rnd(0, 6), vr: rnd(-0.4, 0.4), grav: 0 }); }
    function chaos() { boom(); rain(); jolt(); document.body.animate(
      [{ filter: "hue-rotate(0deg)" }, { filter: "hue-rotate(360deg)" }], { duration: 1000 }); }
    function jolt() { title.classList.add("shake"); setTimeout(() => title.classList.remove("shake"), 600); }
    addEventListener("pointerdown", e => spawn(e.clientX, e.clientY, 30, 10));

    (function loop() {
      ctx.fillStyle = "rgba(17,17,17,0.25)"; ctx.fillRect(0, 0, W, H);
      parts = parts.filter(p => p.life > 0);
      for (const p of parts) {
        p.x += p.vx; p.y += p.vy; p.vy += p.grav ?? 0.18; p.rot += p.vr;
        p.life -= 0.012; p.vx *= 0.99;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(p.life, 0); ctx.fillStyle = p.c;
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r); ctx.restore();
      }
      requestAnimationFrame(loop);
    })();
    setTimeout(boom, 400);
  </script>
</body>
</html>
